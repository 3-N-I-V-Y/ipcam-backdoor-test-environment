services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
    volumes:
      - ./services/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    healthcheck:
      test: ["CMD", "/mediamtx", "--version"]
      interval: 5s
      timeout: 3s
      retries: 20

  control-server:
    build: ./services/control-server
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"
      interval: 5s
      timeout: 3s
      retries: 20

  camera-app:
    build: ./services/camera-app
    depends_on:
      mediamtx:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      CAMERA_ID: camera-app-001
      LAB_MODE: ${CAMERA_APP_LAB_MODE:-none}
      RTSP_URL: rtsp://mediamtx:8554/cam1
      INPUT_SOURCE: /samples/demo.mp4
      API_HOST: 0.0.0.0
      API_PORT: 8090
      CONTROL_URL: ${CAMERA_APP_CONTROL_URL:-http://control-server:8080}
      BEACON_INTERVAL_SECONDS: ${CAMERA_APP_BEACON_INTERVAL_SECONDS:-10}
      BEACON_TIMEOUT_SECONDS: ${CAMERA_APP_BEACON_TIMEOUT_SECONDS:-3}
    volumes:
      - ./samples:/samples:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"
      interval: 5s
      timeout: 3s
      retries: 20
