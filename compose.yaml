services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8000:8000/udp"
      - "8001:8001/udp"
    volumes:
      - ./services/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    healthcheck:
      test: ["CMD", "/mediamtx", "--version"]
      interval: 5s
      timeout: 3s
      retries: 20

  control-server:
    build:
      context: .
      dockerfile: services/control-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SCENARIO_LOG_ENABLED: ${SCENARIO_LOG_ENABLED:-true}
      SCENARIO_LOG_ROOT: /data/scenarios
      SCENARIO_ID: ${SCENARIO_ID:-baseline}
      SCENARIO_RUN_ID: ${SCENARIO_RUN_ID:-manual-run}
    volumes:
      - ./data/scenarios:/data/scenarios
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"
      interval: 5s
      timeout: 3s
      retries: 20

  camera-app:
    build:
      context: .
      dockerfile: services/camera-app/Dockerfile
    depends_on:
      mediamtx:
        condition: service_healthy
      control-server:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      RUN_MODE: docker
      CAMERA_ID: camera-app-001
      LAB_MODE: ${CAMERA_APP_LAB_MODE:-none}
      SOURCE_TYPE: ${CAMERA_APP_SOURCE_TYPE:-file}
      RTSP_URL: rtsp://mediamtx:8554/cam1
      INPUT_SOURCE: /samples/demo.mp4
      WEBCAM_BACKEND: ${CAMERA_APP_WEBCAM_BACKEND:-v4l2}
      WEBCAM_DEVICE: ${CAMERA_APP_WEBCAM_DEVICE:-/dev/video0}
      WEBCAM_FRAMERATE: ${CAMERA_APP_WEBCAM_FRAMERATE:-30}
      WEBCAM_RESOLUTION: ${CAMERA_APP_WEBCAM_RESOLUTION:-1280x720}
      WEBCAM_INPUT_FORMAT: ${CAMERA_APP_WEBCAM_INPUT_FORMAT:-}
      API_HOST: 0.0.0.0
      API_PORT: 8090
      PRIMARY_CONTROL_URL: ${CAMERA_APP_PRIMARY_CONTROL_URL:-http://control-server:8080}
      PRIMARY_BEACON_ENABLED: ${CAMERA_APP_PRIMARY_BEACON_ENABLED:-true}
      PRIMARY_POLL_ENABLED: ${CAMERA_APP_PRIMARY_POLL_ENABLED:-true}
      PRIMARY_BEACON_INTERVAL_SECONDS: ${CAMERA_APP_PRIMARY_BEACON_INTERVAL_SECONDS:-10}
      PRIMARY_BEACON_TIMEOUT_SECONDS: ${CAMERA_APP_PRIMARY_BEACON_TIMEOUT_SECONDS:-3}
      PRIMARY_POLL_INTERVAL_SECONDS: ${CAMERA_APP_PRIMARY_POLL_INTERVAL_SECONDS:-10}
      PRIMARY_POLL_TIMEOUT_SECONDS: ${CAMERA_APP_PRIMARY_POLL_TIMEOUT_SECONDS:-3}
      SCAN_ENABLED: ${CAMERA_APP_SCAN_ENABLED:-}
      SCAN_TARGETS: ${CAMERA_APP_SCAN_TARGETS:-control-server,nvr-console,mediamtx}
      SCAN_PORTS: ${CAMERA_APP_SCAN_PORTS:-22,23,80,443,554,8554,8080,8090,8091,8888}
      SCAN_INTERVAL_SECONDS: ${CAMERA_APP_SCAN_INTERVAL_SECONDS:-60}
      SCAN_TIMEOUT_SECONDS: ${CAMERA_APP_SCAN_TIMEOUT_SECONDS:-1}
      SCAN_STARTUP_DELAY_SECONDS: ${CAMERA_APP_SCAN_STARTUP_DELAY_SECONDS:-10}
      SCAN_BLOCK_EXTERNAL: ${CAMERA_APP_SCAN_BLOCK_EXTERNAL:-true}
      SCAN_MAX_ATTEMPTS: ${CAMERA_APP_SCAN_MAX_ATTEMPTS:-0}
      SCAN_PHASE: ${CAMERA_APP_SCAN_PHASE:-low_and_slow_scan}
      SCAN_LABEL: ${CAMERA_APP_SCAN_LABEL:-scanning}
      SCAN_TECHNIQUE_ID: ${CAMERA_APP_SCAN_TECHNIQUE_ID:-T1046}
      SCENARIO_LOG_ENABLED: ${SCENARIO_LOG_ENABLED:-true}
      SCENARIO_LOG_ROOT: /data/scenarios
      SCENARIO_ID: ${SCENARIO_ID:-baseline}
      SCENARIO_RUN_ID: ${SCENARIO_RUN_ID:-manual-run}
    volumes:
      - ./samples:/samples:ro
      - ./data/scenarios:/data/scenarios
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"
      interval: 5s
      timeout: 3s
      retries: 20

  nvr-console:
    build:
      context: .
      dockerfile: services/nvr-console/Dockerfile
    depends_on:
      camera-app:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    ports:
      - "8091:8091"
    environment:
      NVR_APP_HOST: 0.0.0.0
      NVR_APP_PORT: 8091
      NVR_DB_PATH: /data/nvr/nvr.sqlite3
      NVR_RECORDINGS_ROOT: /data/recordings
      NVR_CONTROL_SERVER_URL: http://control-server:8080
      NVR_ADMIN_USERNAME: ${NVR_ADMIN_USERNAME:-admin}
      NVR_ADMIN_PASSWORD: ${NVR_ADMIN_PASSWORD:-lab-admin}
      NVR_CAMERA_ID: camera-app-001
      NVR_CAMERA_NAME: ${NVR_CAMERA_NAME:-Lobby Entrance}
      NVR_CAMERA_LOCATION: ${NVR_CAMERA_LOCATION:-HQ / Entrance}
      NVR_CAMERA_MODEL: ${NVR_CAMERA_MODEL:-LAB-CAM-1080P}
      NVR_CAMERA_VENDOR: ${NVR_CAMERA_VENDOR:-OpenCam Labs}
      NVR_CAMERA_STATUS_URL: http://camera-app:8090/status
      NVR_CAMERA_RTSP_URL: rtsp://mediamtx:8554/cam1
      NVR_CAMERA_HLS_URL: http://localhost:8888/cam1/index.m3u8
      NVR_DEFAULT_RETENTION_DAYS: ${NVR_DEFAULT_RETENTION_DAYS:-7}
      NVR_RECORDING_SEGMENT_SECONDS: ${NVR_RECORDING_SEGMENT_SECONDS:-60}
      NVR_RECORDING_RTSP_TRANSPORT: ${NVR_RECORDING_RTSP_TRANSPORT:-tcp}
      SCENARIO_LOG_ENABLED: ${SCENARIO_LOG_ENABLED:-true}
      SCENARIO_LOG_ROOT: /data/scenarios
      SCENARIO_ID: ${SCENARIO_ID:-baseline}
      SCENARIO_RUN_ID: ${SCENARIO_RUN_ID:-manual-run}
    volumes:
      - ./data/nvr:/data/nvr
      - ./data/recordings:/data/recordings
      - ./data/scenarios:/data/scenarios
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')"
      interval: 5s
      timeout: 3s
      retries: 20
