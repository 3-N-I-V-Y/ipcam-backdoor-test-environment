<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="{{ request.url_for('static', path='app.css') }}">
</head>
<body class="login-body">
  <section class="login-panel">
    <div class="brand compact">
      <span class="brand-kicker">Phase 1</span>
      <h1>Sentinel NVR</h1>
      <p>Administrator console for the lab IP camera stack.</p>
    </div>

    <form method="post" action="/login" class="stack-form">
      <label>
        <span>Username</span>
        <input type="text" name="username" value="admin" autocomplete="username" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      {% if error %}
      <p class="error-banner">{{ error }}</p>
      {% endif %}
      <button class="primary-button" type="submit">Sign in to Console</button>
    </form>

    <div class="login-footnote">
      Default credentials are controlled by `NVR_ADMIN_USERNAME` and `NVR_ADMIN_PASSWORD`.
    </div>
  </section>
</body>
</html>
